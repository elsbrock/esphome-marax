esphome:
  name: marax-display
  friendly_name: "Mara X Display"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 4MB

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Marax-Display Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# UART for Mara X communication
uart:
  id: marax_uart
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

psram:
  mode: octal
  speed: 80MHz

spi:
  id: display_qspi
  type: quad
  clk_pin: 47
  data_pins: [21,48,40,39]

power_supply:
  id: backlight_id
  pin: 1
  enable_on_boot: true

i2c:
  sda: 4
  scl: 8

touchscreen:
  platform: axs15231
  id: main_touchscreen
  display: main_display
  transform:
    swap_xy: true
    mirror_y: true
  on_touch:
    - logger.log:
        format: "Touch at (%d, %d)"
        args: [touch.x, touch.y]

# QSPI Display configuration for AXS15231 with LVGL
display:
  - platform: qspi_dbi
    id: main_display
    model: JC4832W535
    data_rate: 40MHz
    rotation: 90
    dimensions:
      height: 480
      width: 320
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    auto_clear_enabled: false

# LVGL Configuration
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen

  style_definitions:
    - id: style_screen
      bg_color: 0x000000

  pages:
    - id: main_page
      bg_color: 0x000000  # Pure black background
      widgets:
        # Top labels (no header bar)
        - label:
            align: TOP_LEFT
            x: 10
            y: 5
            text: "\U000F02E3 Mara X"
            text_font: header_font
            text_color: 0x888888
        - label:
            id: machine_status
            align: TOP_MID
            y: 5
            text: "NO DATA"
            text_font: default_font
            text_color: 0xFF5722
        - label:
            id: wifi_status
            align: TOP_RIGHT
            x: -10
            y: 5
            text: "\U000F05A9"
            text_font: header_font
            text_color: 0x888888

        # Left column (1/4) - Timer and temperatures
        - obj:
            id: left_panel
            x: 10
            y: 35
            width: 115  # ~1/4 of 480px minus padding
            height: 245  # Use more vertical space
            bg_color: 0x000000
            border_width: 0
            pad_all: 0
            widgets:
              # Timer (prominent at top)
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  text: "TIMER"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: brew_timer
                  align: TOP_LEFT
                  x: 0
                  y: 15
                  text: "00:00"
                  text_font: temp_font
                  text_color: 0x00FF00

              # Steam temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 70
                  text: "STEAM"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: steam_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 85
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Target temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 120
                  text: "TARGET"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: target_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 135
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # HX/Brew temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 170
                  text: "BREW"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: hx_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 185
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Version info
              - label:
                  id: version_display
                  align: TOP_LEFT
                  x: 0
                  y: 220
                  text: "--"
                  text_font: small_font
                  text_color: 0x555555

        # Right column (3/4) - Graph area (mocked for now)
        - obj:
            id: graph_area
            x: 135
            y: 35
            width: 335  # ~3/4 of 480px minus padding
            height: 245  # Use more vertical space
            bg_color: 0x000000
            border_width: 1
            border_color: 0x333333
            pad_all: 5
            widgets:
              - label:
                  align: CENTER
                  text: "TEMPERATURE GRAPH\n(Coming Soon)"
                  text_font: default_font
                  text_color: 0x555555

        # Bottom status indicators - span full width
        - obj:
            id: status_indicators
            x: 10
            y: 290
            width: 460
            height: 25
            bg_color: 0x000000
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: heating_status
                  align: LEFT_MID
                  x: 0
                  text: "\U000F1A45 HEAT"
                  text_font: small_font
                  text_color: 0x333333
              - label:
                  id: pump_status
                  align: LEFT_MID
                  x: 100
                  text: "\U000F1B22 PUMP"
                  text_font: small_font
                  text_color: 0x333333
              - label:
                  id: uart_status
                  align: RIGHT_MID
                  x: 0
                  text: "\U000F065C UART"
                  text_font: small_font
                  text_color: 0xFF5722

# Fonts for LVGL
font:
  - file: "gfonts://Roboto"
    id: default_font
    size: 16
    bpp: 4
    extras:
      - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F1A45", # mdi-heat-wave
          "\U000F1B22", # mdi-pump-off
          "\U000F1402", # mdi-pump
          "\U000F065C", # mdi-uart
          "\U000F0140"  # mdi-arrow-right
        ]
  - file: "gfonts://Roboto@700"
    id: header_font
    size: 20
    bpp: 4
    extras:
      - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F05A9", # mdi-wifi
          "\U000F02E3"  # mdi-coffee
        ]
  - file: "gfonts://Roboto@700"
    id: temp_font
    size: 32
    bpp: 4
  - file: "gfonts://Roboto"
    id: small_font
    size: 12
    bpp: 4

# Sensors for Mara X temperature data
sensor:
  - platform: template
    id: steam_temp
    name: "Steam Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: service_temp
    name: "Service Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: hx_temp
    name: "HX Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip

  - platform: template
    id: mara_raw_data
    name: "Mara X Raw Data"

  - platform: template
    id: mara_status
    name: "Mara X Status"

  - platform: template
    id: mara_version
    name: "Mara X Version"

# Mara X protocol parsing
interval:
  - interval: 100ms
    then:
      - lambda: |-
          // Read UART data and parse Mara X protocol
          static std::string buffer = "";
          static uint32_t last_data_time = 0;
          static bool connected = false;
          uint8_t data;
          
          // Check for data timeout (5 seconds)
          uint32_t now = millis();
          if (connected && (now - last_data_time) > 5000) {
            // Connection lost - show disconnected state
            connected = false;
            
            // Update display with N/A values
            lv_label_set_text((lv_obj_t*)id(steam_temp_display), "--°C");
            lv_label_set_text((lv_obj_t*)id(target_temp_display), "--°C");
            lv_label_set_text((lv_obj_t*)id(hx_temp_display), "--°C");
            lv_label_set_text((lv_obj_t*)id(version_display), "--");
            
            // Update status indicators to inactive
            lv_label_set_text((lv_obj_t*)id(heating_status), "\U000F1A45 HEAT");
            lv_obj_set_style_text_color((lv_obj_t*)id(heating_status), lv_color_hex(0x333333), 0);
            lv_label_set_text((lv_obj_t*)id(pump_status), "\U000F1B22 PUMP");
            lv_obj_set_style_text_color((lv_obj_t*)id(pump_status), lv_color_hex(0x333333), 0);
            
            // Update machine status
            lv_label_set_text((lv_obj_t*)id(machine_status), "NO DATA");
            lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0xFF5722), 0);
            
            // Update UART status
            lv_label_set_text((lv_obj_t*)id(uart_status), "\U000F065C UART");
            lv_obj_set_style_text_color((lv_obj_t*)id(uart_status), lv_color_hex(0xFF5722), 0);
            
            ESP_LOGW("marax", "UART connection lost - no data for 5+ seconds");
          }
          
          while (id(marax_uart).available()) {
            id(marax_uart).read_byte(&data);
            buffer += (char)data;
            
            // Look for newline (end of message)
            if (data == '\n') {
              // Parse format: C1.06,116,124,093,0840,1,0
              if (buffer.length() > 10 && buffer[0] == 'C') {
                std::vector<std::string> parts;
                std::string current = "";
                
                for (char c : buffer) {
                  if (c == ',' || c == '\n') {
                    parts.push_back(current);
                    current = "";
                  } else {
                    current += c;
                  }
                }
                
                if (parts.size() >= 7) {
                  // Valid data received - update connection state
                  last_data_time = now;
                  if (!connected) {
                    connected = true;
                    ESP_LOGI("marax", "UART connection restored");
                  }
                  
                  // Parse values: version, steam_temp, target_temp, hx_temp, time, heat, pump
                  float steam_temp_val = std::stof(parts[1]);
                  float target_temp_val = std::stof(parts[2]);  
                  float hx_temp_val = std::stof(parts[3]);
                  int heat_status = std::stoi(parts[5]);
                  int pump_status = std::stoi(parts[6]);
                  
                  // Update sensors
                  id(steam_temp).publish_state(steam_temp_val);
                  id(service_temp).publish_state(target_temp_val);
                  id(hx_temp).publish_state(hx_temp_val);
                  
                  // Update display labels
                  lv_label_set_text((lv_obj_t*)id(steam_temp_display), str_sprintf("%.0f°C", steam_temp_val).c_str());
                  lv_label_set_text((lv_obj_t*)id(target_temp_display), str_sprintf("%.0f°C", target_temp_val).c_str());
                  lv_label_set_text((lv_obj_t*)id(hx_temp_display), str_sprintf("%.0f°C", hx_temp_val).c_str());
                  
                  // Update status indicators
                  if (heat_status == 1) {
                    lv_label_set_text((lv_obj_t*)id(heating_status), "\U000F1A45 HEAT");
                    lv_obj_set_style_text_color((lv_obj_t*)id(heating_status), lv_color_hex(0xFF5722), 0);
                  } else {
                    lv_label_set_text((lv_obj_t*)id(heating_status), "\U000F1A45 HEAT");
                    lv_obj_set_style_text_color((lv_obj_t*)id(heating_status), lv_color_hex(0x555555), 0);
                  }
                  
                  if (pump_status == 1) {
                    lv_label_set_text((lv_obj_t*)id(pump_status), "\U000F1402 PUMP");
                    lv_obj_set_style_text_color((lv_obj_t*)id(pump_status), lv_color_hex(0x2196F3), 0);
                  } else {
                    lv_label_set_text((lv_obj_t*)id(pump_status), "\U000F1B22 PUMP");
                    lv_obj_set_style_text_color((lv_obj_t*)id(pump_status), lv_color_hex(0x555555), 0);
                  }
                  
                  // Update machine status
                  if (pump_status == 1) {
                    lv_label_set_text((lv_obj_t*)id(machine_status), "BREWING");
                    lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0x2196F3), 0);
                  } else if (heat_status == 1) {
                    lv_label_set_text((lv_obj_t*)id(machine_status), "HEATING UP");
                    lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0xFF9800), 0);
                  } else {
                    lv_label_set_text((lv_obj_t*)id(machine_status), "READY");
                    lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0x4CAF50), 0);
                  }
                  
                  // Update UART status to connected
                  lv_label_set_text((lv_obj_t*)id(uart_status), "\U000F065C UART");
                  lv_obj_set_style_text_color((lv_obj_t*)id(uart_status), lv_color_hex(0x4CAF50), 0);
                  
                  // Update version from first part (e.g., "C1.06")
                  std::string version = parts[0].substr(1); // Remove 'C'
                  lv_label_set_text((lv_obj_t*)id(version_display), ("V" + version).c_str());
                  id(mara_version).publish_state(version.c_str());
                  id(mara_raw_data).publish_state(buffer.c_str());
                  
                  ESP_LOGD("marax", "Parsed: Steam=%.0f Target=%.0f HX=%.0f Heat=%d Pump=%d", 
                           steam_temp_val, target_temp_val, hx_temp_val, heat_status, pump_status);
                }
              }
              buffer = "";
            }
          }
