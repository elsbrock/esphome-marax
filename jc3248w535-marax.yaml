esphome:
  name: jc3248w535-marax
  friendly_name: "jc3248w535 Mara X Display"
  platformio_options:
    build_flags:
      - -D LV_USE_CHART=1
      - -D MARAX_TEST_MODE=0  # Set to 0 for production, 1 for development
  includes:
    - includes/chart_helpers.h

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 4MB

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Marax-Display Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# UART for Mara X communication
uart:
  id: marax_uart
  tx_pin:
    number: GPIO43
    inverted: true  # Mara X uses inverted serial logic
  rx_pin:
    number: GPIO44
    inverted: true  # Mara X uses inverted serial logic
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

psram:
  mode: octal
  speed: 80MHz

spi:
  id: display_qspi
  type: quad
  clk_pin: 47
  data_pins: [21,48,40,39]

power_supply:
  id: backlight_id
  pin: 1
  enable_on_boot: true

i2c:
  sda: 4
  scl: 8

touchscreen:
  platform: axs15231
  id: main_touchscreen
  display: main_display
  transform:
    swap_xy: true
    mirror_y: true
  on_touch:
    - logger.log:
        format: "Touch at (%d, %d)"
        args: [touch.x, touch.y]

# QSPI Display configuration for AXS15231 with LVGL
display:
  - platform: qspi_dbi
    id: main_display
    model: JC4832W535
    data_rate: 40MHz
    rotation: 90
    dimensions:
      height: 480
      width: 320
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    auto_clear_enabled: false

# Include component configurations
<<: !include config/display_ui.yaml
<<: !include config/fonts.yaml
<<: !include config/sensors.yaml
<<: !include config/uart_parser.yaml
