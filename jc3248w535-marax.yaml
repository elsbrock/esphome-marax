esphome:
  name: jc3248w535-marax
  friendly_name: "jc3248w535 Mara X Display"
  platformio_options:
    build_flags:
      - -D LV_USE_CHART=1
  includes:
    - includes/chart_helpers.h
    - includes/timer_helpers.h

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 4MB

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Marax-Display Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# UART for Mara X communication
uart:
  id: marax_uart
  tx_pin:
    number: GPIO43
    inverted: true  # Mara X uses inverted serial logic
  rx_pin:
    number: GPIO44
    inverted: true  # Mara X uses inverted serial logic
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

psram:
  mode: octal
  speed: 80MHz

spi:
  id: display_qspi
  type: quad
  clk_pin: 47
  data_pins: [21,48,40,39]

power_supply:
  id: backlight_id
  pin: 1
  enable_on_boot: true

i2c:
  sda: 4
  scl: 8

touchscreen:
  platform: axs15231
  id: main_touchscreen
  display: main_display
  transform:
    swap_xy: true
    mirror_y: true
  on_touch:
    - logger.log:
        format: "Touch at (%d, %d)"
        args: [touch.x, touch.y]

# QSPI Display configuration for AXS15231 with LVGL
display:
  - platform: qspi_dbi
    id: main_display
    model: JC4832W535
    data_rate: 40MHz
    rotation: 90
    dimensions:
      height: 480
      width: 320
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    auto_clear_enabled: false

# Time update interval
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: time_display
          text: !lambda |-
            auto time = id(homeassistant_time).now();
            if (time.is_valid()) {
              return time.strftime("%H:%M").c_str();
            }
            return "--:--";
      # Update UART status based on demo mode
      - if:
          condition:
            lambda: 'return id(demo_mode_enabled);'
          then:
            - lvgl.label.update:
                id: uart_status
                text: "\U000F04A2"  # Signal icon for demo mode
                text_color: 0xFFC107  # Amber for demo mode
          else:
            - lvgl.label.update:
                id: uart_status  
                text: "\U000F08BF"  # No signal icon when no data
                text_color: 0xFF9800  # Orange for no data
      # Generate demo data when enabled with dynamic resolution
      - lambda: |-
          // Always call generate_test_data - it handles timing internally
          generate_test_data(false);
  # Timer update interval (100ms for smooth timer)
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: 'return id(demo_mode_enabled);'
          then:
            - lambda: |-
                // Handle timer reset request
                handle_timer_reset_request(id(timer_reset_requested));
                if (id(timer_reset_requested)) {
                    id(timer_reset_requested) = false;  // Clear the flag
                }
                
                // Start timer when demo mode is enabled
                start_timer();
                
                // Update timer display with optimized logic
                update_timer_display((lv_obj_t*)id(brew_timer));
          else:
            - lvgl.label.update:
                id: brew_timer
                text: "00:00.0"
                text_color: 0x555555  # Gray when stopped
            - lambda: |-
                // Stop timer when demo mode is disabled
                stop_timer();

# Include component configurations
<<: !include config/display_ui.yaml
<<: !include config/fonts.yaml
<<: !include config/sensors.yaml
<<: !include config/uart_parser.yaml
