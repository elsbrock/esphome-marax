esphome:
  name: jc3248w535-marax
  friendly_name: "jc3248w535 Mara X Display"
  platformio_options:
    build_flags:
      # MARAX_PRODUCTION silences verbose ESP_LOGD/V from our chart helpers.
      - -D MARAX_PRODUCTION=1
      # Treat warnings as errors so lint regressions break the build.
      - -Wunused
      - -Werror
      # Force-enable LV_USE_CHART. ESPHome generates lv_conf.h based on
      # widgets it can see in the YAML; our chart is built imperatively in
      # on_boot, so ESPHome emits `#define LV_USE_CHART 0`. The -U/-D pair
      # undefines that and re-enables the chart widget without tripping
      # -Werror's "macro redefined" check.
      - -U LV_USE_CHART
      - -D LV_USE_CHART=1
  includes:
    - includes/chart_helpers.h
    - includes/timer_helpers.h
    - includes/chart_draw.h
  # Build the lv_chart after LVGL has finished setting up the page tree.
  # Previously this was done as a side-effect of a dummy label's text lambda
  # in display_ui.yaml, which was load-bearing and re-polled by ESPHome.
  on_boot:
    priority: -100
    then:
      - lambda: |-
          create_temp_chart(id(graph_area));

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 4MB

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Marax-Display Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# Improv lets ESP Web Tools configure WiFi over USB-serial right after a
# fresh flash — no need to connect to the fallback hotspot first.
improv_serial:

# UART for Mara X communication
uart:
  id: marax_uart
  tx_pin:
    number: GPIO43
    inverted: true  # Mara X uses inverted serial logic
  rx_pin:
    number: GPIO44
    inverted: true  # Mara X uses inverted serial logic
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  # Event-driven RX: the debug trigger delivers one complete line per call
  # whenever a '\n' arrives. Replaces a 100ms polling interval that ran the
  # parse + blink + timeout lambdas regardless of whether any data was
  # waiting. The bytes / timeout fields are required by ESPHome but set high
  # so the delimiter dominates in practice.
  debug:
    direction: RX
    after:
      delimiter: "\n"
      bytes: 256
      timeout: 100ms
    sequence:
      - lambda: |-
          if (direction != UART_DIRECTION_RX) return;
          if (bytes.size() < 10 || bytes[0] != 'C') return;

          // Parse on a stack buffer instead of building a std::vector<std::string>.
          // Frame format: "C1.06,116,124,093,0840,1,0\n" — temps are ints, not floats.
          char line[64];
          size_t len = bytes.size() < sizeof(line) - 1 ? bytes.size() : sizeof(line) - 1;
          memcpy(line, bytes.data(), len);
          line[len] = '\0';

          char ver[16];
          int steam_i, target_i, hx_i, time_i, heat_status, pump_status;
          int n = sscanf(line, "C%15[^,],%d,%d,%d,%d,%d,%d",
                         ver, &steam_i, &target_i, &hx_i, &time_i,
                         &heat_status, &pump_status);
          if (n != 7) return;

          uint32_t now = millis();
          id(last_uart_data_ms) = now;
          if (!id(uart_connected)) {
            id(uart_connected) = true;
            ESP_LOGI("marax", "UART connection restored");
          }
          if (id(demo_mode_enabled)) {
            id(demo_mode_enabled) = false;
            ESP_LOGI("marax", "Demo mode disabled - real UART data received");
          }

          // Pump edge: timer + high-res chart switch + brew shading window
          static int last_pump_status = -1;
          if (last_pump_status != pump_status) {
            if (pump_status == 1 && last_pump_status == 0) {
              start_timer();
              id(high_res_chart) = true;
              ESP_LOGI("marax", "Brew started - high-res mode");
              brew_event_start(now);
              switch_chart_resolution();
            } else if (pump_status == 0 && last_pump_status == 1) {
              stop_timer();
              set_timer_neutral((lv_obj_t*)id(brew_timer));
              ESP_LOGI("marax", "Brew stopped");
              brew_event_stop(now);
            }
            last_pump_status = pump_status;
          }

          float steam = (float)steam_i;
          float target = (float)target_i;
          float hx = (float)hx_i;

          id(steam_temp).publish_state(steam);
          id(service_temp).publish_state(target);
          id(hx_temp).publish_state(hx);

          // add_raw_uart_data updates the temperature / heat / pump labels
          // through the gated cache in update_temperature_displays, so we
          // don't re-touch those widgets here.
          add_raw_uart_data(steam, hx, target, heat_status, pump_status);

          // Machine status is not covered by the temperature cache.
          if (pump_status == 1) {
            lv_label_set_text((lv_obj_t*)id(machine_status), "BREWING");
            lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0x2196F3), 0);
          } else if (heat_status == 1) {
            lv_label_set_text((lv_obj_t*)id(machine_status), "HEATING UP");
            lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0xFF9800), 0);
          } else {
            lv_label_set_text((lv_obj_t*)id(machine_status), "READY");
            lv_obj_set_style_text_color((lv_obj_t*)id(machine_status), lv_color_hex(0x4CAF50), 0);
          }

          lv_label_set_text((lv_obj_t*)id(uart_status), "\U000F04A2");
          lv_obj_set_style_text_color((lv_obj_t*)id(uart_status), lv_color_hex(0x4CAF50), 0);

          char vbuf[24];
          snprintf(vbuf, sizeof(vbuf), "V%s", ver);
          lv_label_set_text((lv_obj_t*)id(version_display), vbuf);
          id(mara_version).publish_state(ver);
          std::string raw(bytes.begin(), bytes.end());
          id(mara_raw_data).publish_state(raw.c_str());

          ESP_LOGD("marax", "Parsed: Steam=%d Target=%d HX=%d Heat=%d Pump=%d",
                   steam_i, target_i, hx_i, heat_status, pump_status);

psram:
  mode: octal
  speed: 80MHz

spi:
  id: display_qspi
  type: quad
  clk_pin: 47
  data_pins: [21,48,40,39]

power_supply:
  id: backlight_id
  pin: 1
  enable_on_boot: true

i2c:
  sda: 4
  scl: 8

touchscreen:
  platform: axs15231
  id: main_touchscreen
  display: main_display
  transform:
    swap_xy: true
    mirror_y: true
  on_touch:
    - logger.log:
        format: "Touch at (%d, %d)"
        args: [touch.x, touch.y]

# QSPI Display configuration for AXS15231 with LVGL.
# Rotation is owned by the LVGL config (see config/display_ui.yaml) — ESPHome
# 2026.4+ rejects `rotation:` here when the display is bound to lvgl.
display:
  - platform: qspi_dbi
    id: main_display
    model: JC4832W535
    data_rate: 40MHz
    dimensions:
      height: 480
      width: 320
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    auto_clear_enabled: false

# Time update interval (reduced frequency for time display)
interval:
  - interval: 5s  # Reduced from 1s - clock doesn't need to update every second
    then:
      - lvgl.label.update:
          id: time_display
          text: !lambda |-
            auto time = id(homeassistant_time).now();
            if (time.is_valid()) {
              return time.strftime("%H:%M").c_str();
            }
            return "--:--";
      # Update UART status based on demo mode (less frequent)
      - if:
          condition:
            lambda: 'return id(demo_mode_enabled);'
          then:
            - lvgl.label.update:
                id: uart_status
                text: "\U000F04A2"  # Signal icon for demo mode
                text_color: 0xFFC107  # Amber for demo mode
          else:
            - lvgl.label.update:
                id: uart_status  
                text: "\U000F08BF"  # No signal icon when no data
                text_color: 0xFF9800  # Orange for no data
  # Demo data generation (400ms timing to match real Mara X UART frequency)
  - interval: 400ms  # Match real Mara X UART frequency for realistic testing
    then:
      - lambda: |-
          // Generate test data at 400ms intervals like real Mara X
          generate_test_data(false);
  # Timer update interval (100ms for smooth timer)
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: 'return id(demo_mode_enabled);'
          then:
            - lambda: |-
                // Handle timer reset request
                handle_timer_reset_request(id(timer_reset_requested));
                if (id(timer_reset_requested)) {
                    id(timer_reset_requested) = false;  // Clear the flag
                }
                
                // Timer is now controlled by the state machine in generate_test_data()
                // Only update timer display when demo mode is active
                update_timer_display((lv_obj_t*)id(brew_timer));
          else:
            - lambda: |-
                // Stop timer when demo mode is disabled, keep last value visible
                stop_timer();
                // Set timer color to neutral gray but do not reset text
                set_timer_neutral((lv_obj_t*)id(brew_timer));

# Include component configurations
<<: !include config/display_ui.yaml
<<: !include config/fonts.yaml
<<: !include config/sensors.yaml
<<: !include config/uart_parser.yaml
