# Demo mode toggle
globals:
  - id: demo_mode_enabled
    type: bool
    initial_value: 'false'
  - id: high_res_chart
    type: bool
    initial_value: 'false'  # false = 5s resolution, true = 1s resolution

# Sensors for Mara X temperature data
sensor:
  - platform: template
    id: steam_temp
    name: "Steam Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: service_temp
    name: "Service Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: hx_temp
    name: "HX Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

# Time sensor
time:
  - platform: homeassistant
    id: homeassistant_time

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
      id: wifi_ssid
  
  - platform: template
    id: mara_raw_data
    name: "Mara X Raw Data"

  - platform: template
    id: mara_status
    name: "Mara X Status"

  - platform: template
    id: mara_version
    name: "Mara X Version"

# WiFi connection status
binary_sensor:
  - platform: status
    name: "WiFi Connection"
    id: wifi_connected
    on_press:
      - lambda: |-
          ESP_LOGI("wifi", "WiFi connected - updating icon to green");
          lv_label_set_text((lv_obj_t*)id(wifi_status), "\U000F05A9");  // Connected icon
          lv_obj_set_style_text_color((lv_obj_t*)id(wifi_status), lv_color_hex(0x4CAF50), 0);  // Green
    on_release:
      - lambda: |-
          ESP_LOGI("wifi", "WiFi disconnected - updating icon to orange");
          lv_label_set_text((lv_obj_t*)id(wifi_status), "\U000F16B5");  // Alert icon
          lv_obj_set_style_text_color((lv_obj_t*)id(wifi_status), lv_color_hex(0xFF9800), 0);  // Orange