# Demo mode toggle
globals:
  - id: demo_mode_enabled
    type: bool
    initial_value: 'false'

# Sensors for Mara X temperature data
sensor:
  - platform: template
    id: steam_temp
    name: "Steam Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: service_temp
    name: "Service Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    id: hx_temp
    name: "HX Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1

# Time sensor
time:
  - platform: homeassistant
    id: homeassistant_time

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
      id: wifi_ssid

# WiFi connection status
binary_sensor:
  - platform: status
    name: "WiFi Connection"
    id: wifi_connected

  - platform: template
    id: mara_raw_data
    name: "Mara X Raw Data"

  - platform: template
    id: mara_status
    name: "Mara X Status"

  - platform: template
    id: mara_version
    name: "Mara X Version"