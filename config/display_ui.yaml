# LVGL Configuration
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen

  style_definitions:
    - id: style_screen
      bg_color: 0x000000

  pages:
    - id: main_page
      bg_color: 0x000000  # Pure black background
      widgets:
        # Top labels (no header bar)
        - label:
            align: TOP_LEFT
            x: 10
            y: 8
            text: "\U000F0176 Mara X Monitor"
            text_font: header_font
            text_color: 0x888888
        - label:
            id: machine_status
            align: TOP_MID
            y: 8
            text: "NO DATA"
            text_font: default_font
            text_color: 0xFF5722
        - label:
            id: time_display
            align: TOP_RIGHT
            x: -60
            y: 5
            text: "--:--"
            text_font: header_font
            text_color: 0x888888
        - label:
            id: uart_status
            align: TOP_RIGHT
            x: -35
            y: 5
            text: "\U000F04A2"
            text_font: header_font
            text_color: 0xFF9800
        # Tappable area over UART icon for demo mode toggle
        - obj:
            x: 430  # Absolute position covering right side
            y: 0
            width: 50
            height: 40
            bg_opa: 0  # Transparent
            border_opa: 0  # No border
            on_click:
              - globals.set:
                  id: demo_mode_enabled
                  value: !lambda "return !id(demo_mode_enabled);"
              - logger.log:
                  format: "Demo mode toggled: %s"
                  args: ['id(demo_mode_enabled) ? "ON" : "OFF"']
        - label:
            id: wifi_status
            align: TOP_RIGHT
            x: -10
            y: 5
            text: "\U000F05A9"
            text_font: header_font
            text_color: 0xFF9800

        # Left column (1/4) - Timer and temperatures
        - obj:
            id: left_panel
            x: 10
            y: 42  # Moved down 7px (half of previous 15px)
            width: 135  # Expanded from 115 to 135 pixels
            height: 270  # Expanded from 238 to 270 pixels
            bg_color: 0x000000
            border_width: 0
            pad_all: 0
            scrollable: false
            scroll_chain: false
            click_focusable: false
            widgets:
              # Timer (prominent at top)
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  text: "SHOT TIMER"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: brew_timer
                  align: TOP_LEFT
                  x: 0
                  y: 15
                  text: "00:00"
                  text_font: temp_font
                  text_color: 0x00FF00

              # Steam temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 70
                  text: "STEAM"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: steam_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 85
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Target temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 120
                  text: "TARGET"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: target_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 135
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # HX/Brew temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 170
                  text: "BREW"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: hx_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 185
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Version info
              - label:
                  id: version_display
                  align: TOP_LEFT
                  x: 0
                  y: 220
                  text: "--"
                  text_font: small_font
                  text_color: 0x555555

              # Heat and Pump status
              - label:
                  id: heating_status
                  align: TOP_LEFT
                  x: 0
                  y: 255
                  text: "\U000F1A45 HEAT"
                  text_font: small_font
                  text_color: 0x333333
              - label:
                  id: pump_status
                  align: TOP_LEFT
                  x: 55
                  y: 255
                  text: "\U000F1B22 PUMP"
                  text_font: small_font
                  text_color: 0x333333

        # Right column (3/4) - Temperature Chart
        - obj:
            id: graph_area
            x: 155  # Adjusted for wider left panel (was 125)
            y: 35
            width: 315  # Adjusted for wider left panel (was 345)
            height: 285  # Expanded to bottom (was 260)
            bg_color: 0x000000
            border_width: 0  # Remove border since chart has its own
            pad_all: 0
            scrollable: false  # Disable scrolling
            scroll_chain: false  # Disable scroll chain
            click_focusable: false  # Disable click focus
            widgets:
              - label:
                  text: !lambda |-
                    create_temp_chart(id(graph_area));
                    return "";

