# LVGL Configuration
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen

  style_definitions:
    - id: style_screen
      bg_color: 0x000000

  pages:
    - id: main_page
      bg_color: 0x000000  # Pure black background
      widgets:
        # Top labels (no header bar)
        - label:
            align: TOP_LEFT
            x: 10
            y: 5
            text: "\U000F0176 Mara X Monitor"
            text_font: header_font
            text_color: 0x888888
        - label:
            id: machine_status
            align: TOP_MID
            y: 8
            text: "NO DATA"
            text_font: default_font
            text_color: 0xFF5722
        - label:
            id: time_display
            align: TOP_RIGHT
            x: -60
            y: 5
            text: "--:--"
            text_font: header_font
            text_color: 0x888888
        - label:
            id: uart_status
            align: TOP_RIGHT
            x: -35
            y: 5
            text: "\U000F04A2"
            text_font: header_font
            text_color: 0xFF9800
        # Tappable area over UART icon for demo mode toggle  
        - obj:
            x: 470  # Closer to right edge where touches occur
            y: 100  # Cover y=113-180 area from logs
            width: 10   # Narrow strip at very right edge
            height: 80  # Cover the touch range
            bg_opa: 0  # Transparent
            border_opa: 0  # No border
            on_click:
              - globals.set:
                  id: demo_mode_enabled
                  value: !lambda "return !id(demo_mode_enabled);"
              - logger.log:
                  format: "Demo mode toggled: %s"
                  args: ['id(demo_mode_enabled) ? "ON" : "OFF"']
              - lambda: |-
                  // Reset state machine when demo mode is enabled
                  if (id(demo_mode_enabled)) {
                    demo_reset_state_machine();
                  }
              - globals.set:
                  id: timer_reset_requested
                  value: 'true'
              - if:
                  condition:
                    lambda: 'return !id(demo_mode_enabled);'  # If demo mode was turned OFF
                  then:
                    # Reset display to default state
                    - lvgl.label.update:
                        id: machine_status
                        text: "NO DATA"
                        text_color: 0xFF5722
                    - lvgl.label.update:
                        id: steam_temp_display
                        text: "--°C"
                        text_color: 0x555555
                    - lvgl.label.update:
                        id: target_temp_display
                        text: "--°C"
                        text_color: 0x555555
                    - lvgl.label.update:
                        id: hx_temp_display
                        text: "--°C"
                        text_color: 0x555555
                    - lvgl.label.update:
                        id: heating_status
                        text: "\U000F1A45 HEAT"
                        text_color: 0x333333
                    - lvgl.label.update:
                        id: pump_status
                        text: "\U000F1B22 PUMP"
                        text_color: 0x333333
                    - lvgl.label.update:
                        id: version_display
                        text: "--"
                        text_color: 0x555555
                    - lvgl.label.update:
                        id: brew_timer
                        text: "00:00.0"
                        text_color: 0x555555
                    - lambda: |-
                        // Clear chart data when demo mode is disabled
                        clear_chart_data();
        - label:
            id: wifi_status
            align: TOP_RIGHT
            x: -10
            y: 5
            text: "\U000F05A9"
            text_font: header_font
            text_color: 0xFF9800

        # Left column (1/4) - Timer and temperatures
        - obj:
            id: left_panel
            x: 10
            y: 42  # Moved down 7px (half of previous 15px)
            width: 135  # Expanded from 115 to 135 pixels
            height: 270  # Expanded from 238 to 270 pixels
            bg_color: 0x000000
            border_width: 0
            pad_all: 0
            scrollable: false
            scroll_chain: false
            click_focusable: false
            widgets:
              # Timer (prominent at top)
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  text: "SHOT TIMER"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: brew_timer
                  align: TOP_LEFT
                  x: 0
                  y: 15
                  text: "00:00"
                  text_font: temp_font
                  text_color: 0x00FF00

              # Steam temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 70
                  text: "STEAM"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: steam_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 85
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Target temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 120
                  text: "TARGET"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: target_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 135
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # HX/Brew temp
              - label:
                  align: TOP_LEFT
                  x: 0
                  y: 170
                  text: "BREW"
                  text_font: small_font
                  text_color: 0x888888
              - label:
                  id: hx_temp_display
                  align: TOP_LEFT
                  x: 0
                  y: 185
                  text: "--°C"
                  text_font: header_font
                  text_color: 0x555555

              # Version info
              - label:
                  id: version_display
                  align: TOP_LEFT
                  x: 0
                  y: 220
                  text: "--"
                  text_font: small_font
                  text_color: 0x555555

              # Heat and Pump status
              - label:
                  id: heating_status
                  align: TOP_LEFT
                  x: 0
                  y: 250
                  text: "\U000F1A45 HEAT"
                  text_font: default_font
                  text_color: 0x333333
              - label:
                  id: pump_status
                  align: TOP_LEFT
                  x: 68
                  y: 250
                  text: "\U000F1B22 PUMP"
                  text_font: default_font
                  text_color: 0x333333

        # Right column (3/4) - Temperature Chart
        - obj:
            id: graph_area
            x: 150  # Move 5px left (was 155)
            y: 35
            width: 320  # Increase width by 5px (was 315)
            height: 285  # Expanded to bottom (was 260)
            bg_color: 0x000000
            border_width: 0  # Remove border since chart has its own
            pad_all: 0
            scrollable: false  # Disable scrolling
            scroll_chain: false  # Disable scroll chain
            click_focusable: false  # Disable click focus for now
            widgets:
              - label:
                  text: !lambda |-
                    create_temp_chart(id(graph_area));
                    return "";

        # Transparent overlay for chart resolution toggle
        - obj:
            x: 150  # Same as graph area
            y: 35   # Same as graph area
            width: 320  # Same as graph area
            height: 285  # Same as graph area
            bg_opa: 0  # Fully transparent
            border_opa: 0  # No border
            on_click:
              - globals.set:
                  id: high_res_chart
                  value: !lambda "return !id(high_res_chart);"
              - logger.log:
                  format: "Chart resolution toggled: %s"
                  args: ['id(high_res_chart) ? "1s" : "5s"']
              - lambda: |-
                  // Force chart recreation with new labels
                  recreate_temp_chart(id(graph_area));

