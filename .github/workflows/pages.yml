name: Build firmware & deploy Pages

on:
  # Cut a tag like v0.1.0 to ship a new flashable build to the Pages site.
  # workflow_dispatch lets you redeploy without bumping the tag (e.g. after
  # a docs/ tweak).
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time — don't cancel in-flight runs, just queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # The repo .gitignores secrets.yaml. CI doesn't have the real one, so
      # write a placeholder that satisfies !secret lookups during compile.
      # WiFi is configured at runtime via Improv, so wifi_ssid/wifi_password
      # don't need real values; the other fields get baked into the
      # broadcast binary and any installer can re-flash with their own
      # secrets later.
      - name: Write placeholder secrets.yaml
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "placeholder"
          wifi_password: "placeholder"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "placeholder"
          ap_password: "12345678"
          EOF

      - name: Build firmware
        id: esphome-build
        uses: esphome/build-action@v6
        with:
          yaml_file: jc3248w535-marax.yaml

      - name: Stage Pages content
        run: |
          set -euo pipefail
          mkdir -p staging
          cp -r docs/. staging/

          # esphome/build-action places its outputs in a directory named after
          # the device. Find the factory bin defensively rather than hardcoding
          # the path — the action's layout can shift between versions.
          BIN_PATH="$(find . -name '*.factory.bin' -type f | head -n1)"
          if [ -z "${BIN_PATH}" ]; then
            echo "::error::No .factory.bin produced by esphome/build-action"
            find . -name '*.bin' -type f
            exit 1
          fi
          echo "Found factory bin at: ${BIN_PATH}"
          cp "${BIN_PATH}" "staging/jc3248w535-marax-esp32s3.factory.bin"

          # Stamp the manifest with the git ref so installers see a real
          # version string instead of "dev".
          VERSION="${GITHUB_REF_NAME}"
          if [ "${VERSION}" = "main" ] || [ -z "${VERSION}" ]; then
            VERSION="$(git rev-parse --short HEAD)"
          fi
          tmp="$(mktemp)"
          jq --arg v "${VERSION}" '.version = $v' staging/manifest.json > "${tmp}"
          mv "${tmp}" staging/manifest.json

          echo "Staging contents:"
          ls -la staging/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - id: deployment
        uses: actions/deploy-pages@v4
