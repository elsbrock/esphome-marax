name: Deploy install page

# Builds the firmware and publishes docs/ + the freshly-built .factory.bin
# as a GitHub Pages artifact, so the install button always serves the
# version that matches the tag. Same-origin avoids the CORS issue with
# GitHub's release CDN.
#
# Requires Settings -> Pages -> Source: GitHub Actions (not "Deploy from
# a branch"). Without that, actions/deploy-pages can't push the artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # CI doesn't have secrets.yaml. The bin that gets published flashes
      # placeholder values for everything except WiFi — Improv-Serial /
      # Improv-BLE handle WiFi setup at runtime, and users with HA can
      # re-flash from source with their own api_encryption_key.
      - name: Write placeholder secrets.yaml
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "placeholder"
          wifi_password: "placeholder"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "placeholder"
          ap_password: "12345678"
          EOF

      - name: Build firmware
        id: esphome-build
        uses: esphome/build-action@v7
        with:
          yaml-file: jc3248w535-marax.yaml

      - name: Stage Pages content
        run: |
          set -euo pipefail
          mkdir -p staging
          cp -r docs/. staging/

          # esphome/build-action's output layout has shifted between
          # versions — find the freshly-built factory bin rather than
          # hardcoding a path.
          BIN_PATH="$(find . -name '*.factory.bin' -type f | head -n1)"
          if [ -z "${BIN_PATH}" ]; then
            echo "::error::No .factory.bin produced"
            find . -name '*.bin' -type f
            exit 1
          fi
          cp "${BIN_PATH}" "staging/jc3248w535-marax-esp32s3.factory.bin"

          # Stamp the manifest with the git ref so installers see a real
          # version string (was "v0.1.0" pinned otherwise).
          VERSION="${GITHUB_REF_NAME}"
          if [ "${VERSION}" = "main" ] || [ -z "${VERSION}" ]; then
            VERSION="$(git rev-parse --short HEAD)"
          fi
          tmp="$(mktemp)"
          jq --arg v "${VERSION}" '.version = $v' staging/manifest.json > "${tmp}"
          mv "${tmp}" staging/manifest.json

          echo "Staging contents:"
          ls -la staging/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - id: deployment
        uses: actions/deploy-pages@v4
