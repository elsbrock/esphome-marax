name: Build ESPHome Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          - jc3248w535-marax

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Create secrets file for CI
        run: |
          cat > secrets.yaml << 'EOF'
          # CI build secrets - these are dummy values for compilation only
          wifi_ssid: "DummySSID"
          wifi_password: "dummy_password_123"
          api_encryption_key: "q+J5vVi56oYjVadNowXAVstb2EL68Jitgn5pDExyPXQ="
          ota_password: "dummy_ota_password"
          ap_password: "12345678"
          EOF

      - name: Build ESPHome firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml-file: ${{ matrix.device }}.yaml
          version: latest

      - name: Move generated files to output
        run: |
          mkdir -p output
          cp ${{ steps.esphome-build.outputs.name }}/* output/ || echo "No files to copy"
          ls -la output/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device }}
          path: output/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # Default GITHUB_TOKEN has read-only access; needed write on contents
    # so softprops/action-gh-release can create the release and upload the
    # firmware assets.
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: firmware/
          merge-multiple: true

      - name: List firmware files
        run: |
          echo "Generated firmware files:"
          ls -la firmware/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*
          generate_release_notes: true
          body: |
            ## ESPHome Mara X Display Firmware

            Ready-to-flash firmware for ESP32-S3 with Mara X temperature monitoring.

            ### Installation
            1. Download the appropriate firmware file for your display model
            2. Flash using [ESPHome Web](https://web.esphome.io/) or ESPHome Dashboard
            3. Configure WiFi credentials via captive portal

            ### Supported Devices
            - **jc3248w535**: Use `jc3248w535-marax-esp32s3.*` files

            ### File Types
            - `.factory.bin` - Complete firmware with bootloader (recommended for first install)
            - `.bin` - Application firmware only (for updates)
            - `.ota.bin` - Over-the-air update file

            See [README.md](README.md) for complete setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
