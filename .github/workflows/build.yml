name: Build ESPHome Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build ESPHome firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml_file: jc3248w535c-marax.yaml
          version: latest
          
      - name: Move generated files to output
        run: |
          mkdir -p output
          cp ${{ steps.esphome-build.outputs.name }}/* output/ || echo "No files to copy"
          ls -la output/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: output/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/
          
      - name: List firmware files
        run: |
          echo "Generated firmware files:"
          ls -la firmware/
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*
          generate_release_notes: true
          body: |
            ## ESPHome Mara X Display Firmware
            
            Ready-to-flash firmware for ESP32-S3 with Mara X temperature monitoring.
            
            ### Installation
            1. Download the appropriate firmware file
            2. Flash using ESPHome Dashboard, esptool, or web flasher
            3. Configure WiFi credentials via captive portal
            
            ### Firmware Files
            - `jc3248w535c-marax-esp32s3.bin` - Main firmware binary
            - `jc3248w535c-marax-esp32s3.factory.bin` - Factory image with bootloader
            - `jc3248w535c-marax-esp32s3.ota.bin` - OTA update binary
            
            See [README.md](README.md) for complete setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}